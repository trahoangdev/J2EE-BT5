<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách danh mục</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #1a1a2e; font-size: 28px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-primary { background: #4361ee; color: #fff; }
        .btn-primary:hover { background: #3a56d4; }
        .btn-danger { background: #e63946; color: #fff; }
        .btn-danger:hover { background: #c62828; }
        .btn-warning { background: #f4a261; color: #fff; }
        .btn-warning:hover { background: #e08b3a; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 12px 20px; border-radius: 6px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #4361ee; color: #fff; padding: 14px 16px; text-align: left; font-size: 14px; }
        td { padding: 12px 16px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .actions { display: flex; gap: 6px; align-items: center; }
        .actions form { margin: 0; }
    </style>

    <div class="top-bar">
        <h1>Quản lý danh mục</h1>
        <a th:href="@{/categories/new}" class="btn btn-primary">+ Thêm danh mục</a>
    </div>

    <div th:if="${successMessage}" class="success-msg">
        <span th:text="${successMessage}"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Mã DM</th>
                <th>Tên danh mục</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">Tên danh mục</td>
                <td class="actions">
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                          onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này?');">
                        <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="3" style="text-align:center; padding: 30px; color: #999;">Chưa có danh mục nào.</td>
            </tr>
        </tbody>
    </table>
</section>
</body>
</html>
