<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${mode == 'edit' ? 'Sửa danh mục' : 'Thêm danh mục'}">Form danh mục</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        h1 { color: #1a1a2e; margin-bottom: 24px; font-size: 26px; }
        .form-card { background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
        .error { color: #e63946; font-size: 13px; margin-top: 4px; }
        .btn { display: inline-block; padding: 10px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-primary { background: #4361ee; color: #fff; }
        .btn-primary:hover { background: #3a56d4; }
        .btn-secondary { background: #6c757d; color: #fff; margin-left: 8px; }
        .btn-secondary:hover { background: #5a6268; }
        .form-actions { margin-top: 24px; display: flex; align-items: center; }
    </style>

    <h1 th:text="${mode == 'edit' ? 'Sửa danh mục' : 'Thêm danh mục'}">Form danh mục</h1>

    <div class="form-card">
        <form th:action="${mode == 'edit'} ? @{/categories/edit/{id}(id=${category.id})} : @{/categories}"
              method="post" th:object="${category}">

            <div class="form-group">
                <label for="name">Tên danh mục <span style="color:#e63946">*</span></label>
                <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên danh mục" />
                <div th:if="${#fields.hasErrors('name')}" class="error">
                    <span th:errors="*{name}">Lỗi tên</span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${mode == 'edit' ? 'Cập nhật' : 'Thêm mới'}">Lưu</button>
                <a th:href="@{/categories}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
