<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách sản phẩm</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #1a1a2e; font-size: 28px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-primary { background: #4361ee; color: #fff; }
        .btn-primary:hover { background: #3a56d4; }
        .btn-danger { background: #e63946; color: #fff; }
        .btn-danger:hover { background: #c62828; }
        .btn-warning { background: #f4a261; color: #fff; }
        .btn-warning:hover { background: #e08b3a; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 12px 20px; border-radius: 6px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #4361ee; color: #fff; padding: 14px 16px; text-align: left; font-size: 14px; }
        td { padding: 12px 16px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        .no-img { width: 60px; height: 60px; background: #eee; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 11px; }
        .actions { display: flex; gap: 6px; align-items: center; }
        .actions form { margin: 0; }
        .category-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; background: #e3f2fd; color: #1565c0; }
        .price { font-weight: 600; color: #e63946; }
    </style>

    <div class="top-bar">
        <h1>Quản lý sản phẩm</h1>
        <a th:href="@{/product/add}" class="btn btn-primary">+ Thêm sản phẩm</a>
    </div>

    <div th:if="${successMessage}" class="success-msg">
        <span th:text="${successMessage}"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Mã SP</th>
                <th>Hình ảnh</th>
                <th>Tên sản phẩm</th>
                <th>Giá (VNĐ)</th>
                <th>Danh mục</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td>
                    <img th:if="${product.image != null and !product.image.isEmpty()}"
                         th:src="@{'/uploads/' + ${product.image}}"
                         alt="product image" class="product-img" />
                    <div th:if="${product.image == null or product.image.isEmpty()}" class="no-img">No img</div>
                </td>
                <td th:text="${product.name}">Tên SP</td>
                <td class="price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">0</td>
                <td>
                    <span class="category-badge"
                          th:text="${product.category != null ? product.category.name : 'N/A'}">Danh mục</span>
                </td>
                <td class="actions">
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                          onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">
                        <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6" style="text-align:center; padding: 30px; color: #999;">Chưa có sản phẩm nào.</td>
            </tr>
        </tbody>
    </table>
</section>
</body>
</html>
